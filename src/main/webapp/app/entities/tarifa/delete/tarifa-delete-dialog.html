@if (tarifa) {
  <form name="deleteForm" (ngSubmit)="confirmDelete(tarifa.id!)">
    <div class="modal-header">
      <h4 class="modal-title" data-cy="tarifaDeleteDialogHeading" jhiTranslate="entity.delete.title">Confirmar operación de borrado</h4>
    </div>

    <div class="modal-body">
      <jhi-alert-error />
      <p id="jhi-delete-tarifa-heading" jhiTranslate="mokealApp.tarifa.delete.question" [translateValues]="{ id: tarifa.id }">
        ¿Seguro que quiere eliminar Tarifa {{ tarifa.id }}?
      </p>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
        <fa-icon icon="ban" />&nbsp;<span jhiTranslate="entity.action.cancel">Cancelar</span>
      </button>

      <button id="jhi-confirm-delete-tarifa" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
        <fa-icon icon="times" />&nbsp;<span jhiTranslate="entity.action.delete">Eliminar</span>
      </button>
    </div>
  </form>
}
